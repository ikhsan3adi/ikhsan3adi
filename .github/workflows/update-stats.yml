name: Update GitHub Stats

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Puppeteer browser
        run: bunx puppeteer browsers install chrome

      - name: Generate SVGs
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODEBERG_USERNAME: ${{ github.repository_owner }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GITLAB_USERNAME: ${{ github.repository_owner }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CARD_IDS: github-stats,codeberg-stats,gitlab-stats,wordmark
        run: bun run start

      - name: Commit & push SVG output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profiles
          git diff --staged --quiet || \
            git commit -m "chore: update github stats [skip ci]"
          git push
