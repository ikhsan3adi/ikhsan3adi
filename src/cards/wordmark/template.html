<!doctype html>
<html class="{{#if dark}}dark{{/if}}" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordmark</title>
    <style>
      <!-- INLINE_CSS -->
    </style>
  </head>
  <body class="m-0 p-0 bg-transparent box-border">
    <div
      class="h-min flex flex-col items-center justify-center"
      style="width:{{cardWidth}}px;"
    >
      {{#if dark}}{{{wordmarkSvgDark}}}{{else}}{{{wordmarkSvgLight}}}{{/if}}

      <p
        class="w-full text-sm font-space-grotesk md:text-base text-text dark:text-white text-center leading-relaxed tracking-wide italic"
      >
        {{sentenceId}}
      </p>

      <div
        class="w-[calc(100%-48px)] mx-auto h-px bg-gray-500 dark:bg-gray-600 my-3"
      ></div>

      <p
        class="w-full text-sm font-space-grotesk md:text-base text-text dark:text-white text-center leading-relaxed tracking-wide italic"
      >
        {{sentenceEn}}
      </p>
    </div>
  </body>
</html>
